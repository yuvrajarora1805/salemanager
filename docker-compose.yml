version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WEBSITE_URL: http://website:3000
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_URL=https://sm.omvky.com
      - NEXTAUTH_SECRET=supersecretkey_change_in_production
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=my-secret-pw
      - DB_NAME=goyalfilling
      - WEBSITE_URL=http://website:3000
    depends_on:
      - db
    volumes:
      - website_images:/app/website/public/images
    restart: always

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=my-secret-pw
      - DB_NAME=goyalfilling
    depends_on:
      - db
    volumes:
      - website_images:/app/public/images
    restart: always

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=my-secret-pw
      - MYSQL_DATABASE=goyalfilling
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: always

volumes:
  mysql_data:
